name: Build and deploy Qt WASM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  QT_VERSION: 6.8.3
  EMSCRIPTEN_VERSION: 3.1.56

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSCRIPTEN_VERSION }}
          actions-cache-folder: emsdk-cache

      - name: Install Qt for WebAssembly
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: all_os
          target: wasm
          arch: wasm_singlethread
          cache: true

      # The Qt WASM packages can lose executable bits when extracted by aqt.
      - name: Make Qt WASM tools executable
        run: find "$QT_ROOT_DIR/bin" -type f -exec chmod +x {} +

      - name: Configure
        run: qt-cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Stage GitHub Pages site
        run: |
          mkdir -p site
          cp build/hello_world.html site/index.html
          cp build/hello_world.js site/
          cp build/hello_world.wasm site/
          cp build/qtloader.js site/
          touch site/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
